<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jShopingMart | Jdroid-X Store</title>
    <style>
        :root {
            --primary: #FF9933;
            --bg-dark: #050505;
            --text-main: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: sans-serif;
        }

        .product {
            background: var(--glass);
            padding: 20px;
            border-radius: 10px;
            margin: 10px;
        }

        .btn {
            background: var(--primary);
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>jShopingMart</h1>
    <div class="product">
        <h3>Drone Controller</h3>
        <button class="btn">Add to Cart</button>
    </div>
    <script src="../jWebTheme/jWebThemeBridge.js"></script>
</body>

</html>
